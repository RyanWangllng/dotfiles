format = "$directory$git_branch$git_status$nodejs$python$rust$golang$cmd_duration$line_break$character"

[directory]
truncation_length = 3
style = "bold blue"

[git_branch]
symbol = ""
style = "bold purple"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold yellow"

[nodejs]
symbol = ""
format = "[$symbol($version )]($style)"
style = "bold green"

[python]
symbol = ""
format = "[${symbol}${pyenv_prefix}(${version} )]($style)"
style = "bold yellow"

[rust]
symbol = ""
format = "[$symbol($version )]($style)"
style = "bold red"

[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "
style = "bold cyan"

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"
