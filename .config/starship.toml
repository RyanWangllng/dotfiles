format = "$directory$git_branch$git_status$time$cmd_duration$line_break$character"

[directory]
truncation_length = 3
style = "bold blue"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold yellow"

[time]
disabled = false
format = "[$time]($style) "
style = "bold white"
time_format = "%H:%M"

[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "
style = "bold cyan"

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"